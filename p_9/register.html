<div class="container">
    <h2>Register</h2>

    <form ng-submit="register()">
        <input type="text" placeholder="Name" ng-model="user.name" required>
        <input type="email" placeholder="Email" ng-model="user.email" required>
        <input type="password" placeholder="Password" ng-model="user.password" required>
        <input type="password" placeholder="Confirm Password" ng-model="user.confirmPassword" required>

        <button type="submit">Register</button>
    </form>
</div>
